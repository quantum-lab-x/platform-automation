name: Create GitHub Team

on:
  workflow_dispatch:
    inputs:
      team_name:
        description: "Team name"
        required: true
      github_user:
        description: "GitHub username"
        required: true

jobs:
  create-team:
    runs-on: ubuntu-latest
    steps:
      - name: Create Team and Add User
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORG_ADMIN_TOKEN }}
          script: |
            const org = "quantum-lab-x";
            const teamName = core.getInput('team_name');
            const username = core.getInput('github_user');

            // 🔹 Convert team name to GitHub slug format
            const teamSlug = teamName.toLowerCase().replace(/\s+/g, '-');

            try {
              // 🔹 Try creating the team
              await github.rest.teams.create({
                org,
                name: teamName,
                privacy: "closed"
              });

              core.info(`✅ Team created: ${teamName}`);

            } catch (error) {
              if (error.status === 422) {
                core.info(`⚠️ Team already exists, using existing team`);
              } else {
                throw error;
              }
            }

            // 🔹 Add user to team (works for both new & existing teams)
            await github.rest.teams.addOrUpdateMembershipForUserInOrg({
              org,
              team_slug: teamSlug,
              username,
              role: "member"
            });

            core.info(`✅ User ${username} added to team ${teamName}`);