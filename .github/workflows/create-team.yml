name: Create GitHub Team

on:
  workflow_dispatch:
    inputs:
      team_name:
        description: "Team name"
        required: true
      github_user:
        description: "GitHub username"
        required: true

jobs:
  create-team:
    runs-on: ubuntu-latest
    steps:
      - name: Create Team and Add User
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORG_ADMIN_TOKEN }}
          script: |
            const org = "quantum-lab-x";
            const teamName = core.getInput('team_name');
            const username = core.getInput('github_user');

            let teamSlug;

            try {
              // 🔹 Try creating the team
              const team = await github.rest.teams.create({
                org,
                name: teamName,
                privacy: "closed"
              });

              teamSlug = team.data.slug;
              core.info(`✅ Team created: ${teamName}`);

            } catch (error) {
              // 🔹 If team already exists, fetch it
              if (error.status === 422) {
                core.info(`⚠️ Team already exists, fetching existing team...`);

                const teams = await github.paginate(
                  github.rest.teams.list,
                  { org }
                );

                const existingTeam = teams.find(t => t.name === teamName);

                if (!existingTeam) {
                  throw new Error(`❌ Team exists but not found in list`);
                }

                teamSlug = existingTeam.slug;
              } else {
                throw error;
              }
            }

            // 🔹 Add user to team
            await github.rest.teams.addOrUpdateMembershipForUserInOrg({
              org,
              team_slug: teamSlug,
              username,
              role: "member"
            });

            core.info(`✅ User ${username} added to team ${teamName}`);