name: Create GitHub Team

on:
  workflow_dispatch:
    inputs:
      team_name:
        description: "Team name"
        required: true
      github_user:
        description: "GitHub username"
        required: true
      repo_name:                 # ✅ NEW INPUT
        description: "Repository name"
        required: true

jobs:
  create-team:
    runs-on: ubuntu-latest
    steps:
      - name: Create Team, Invite User, Add to Team, and Grant Repo Access
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORG_ADMIN_TOKEN }}
          script: |
            const org = "quantum-lab-x";

            // ✅ Inputs
            const teamName = context.payload.inputs.team_name;
            const username = context.payload.inputs.github_user;
            const repoName = context.payload.inputs.repo_name;

            if (!teamName || !username || !repoName) {
              throw new Error("❌ Missing required inputs");
            }

            // 🔹 Generate slug
            const teamSlug = teamName
              .toLowerCase()
              .replace(/[^a-z0-9\s-]/g, '')
              .trim()
              .replace(/\s+/g, '-');

            if (!teamSlug) {
              throw new Error("❌ Generated team slug is empty.");
            }

            core.info(`ℹ️ Team Name: ${teamName}`);
            core.info(`ℹ️ Team Slug: ${teamSlug}`);
            core.info(`ℹ️ GitHub User: ${username}`);
            core.info(`ℹ️ Repo Name: ${repoName}`);

            // =========================
            // 🔹 STEP 1: Invite user to org
            // =========================
            try {
              const user = await github.rest.users.getByUsername({
                username,
              });

              await github.rest.orgs.createInvitation({
                org,
                invitee_id: user.data.id,
                role: "direct_member",
              });

              core.info(`📨 Invitation sent to ${username}`);
            } catch (error) {
              if (error.status === 422) {
                core.info(`⚠️ User already invited or already in org`);
              } else {
                throw error;
              }
            }

            // =========================
            // 🔹 STEP 2: Create team
            // =========================
            try {
              await github.rest.teams.create({
                org,
                name: teamName,
                privacy: "closed",
              });

              core.info(`✅ Team created: ${teamName}`);
            } catch (error) {
              if (error.status === 422) {
                core.info(`⚠️ Team already exists`);
              } else {
                throw error;
              }
            }

            // =========================
            // 🔹 STEP 3: Add user to team
            // =========================
            try {
              await github.rest.teams.addOrUpdateMembershipForUserInOrg({
                org,
                team_slug: teamSlug,
                username,
                role: "member",
              });

              core.info(`✅ User ${username} added to team ${teamName}`);
            } catch (error) {
              core.warning(`⚠️ Could not add user immediately`);
              core.warning(error.message);
            }

            // =========================
            // 🔥 STEP 4: Grant team access to repo
            // =========================
            try {
              await github.rest.teams.addOrUpdateRepoPermissionsInOrg({
                org,
                team_slug: teamSlug,
                owner: org,
                repo: repoName,
                permission: "push",   // or "admin"
              });

              core.info(`✅ Team ${teamName} granted access to repo ${repoName}`);
            } catch (error) {
              core.warning(`⚠️ Failed to grant repo access`);
              core.warning(error.message);
            }